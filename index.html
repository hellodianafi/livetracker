<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BWF TOP 10 — Longest Streak Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Work+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   TOKENS
══════════════════════════════════════════ */
:root {
  --bg:         #F5F2E8;
  --surface:    rgba(254,252,245,0.92);
  --surface2:   #EDE9DA;
  --border:     #D8D2C0;
  --tropical:   #008471;
  --pure-sun:   #F4D242;
  --tomato:     #C45F3F;
  --airplane:   #80B0E8;
  --monet:      #898E46;
  --text:       #1A1A14;
  --muted:      #7A7565;
  --radius:     16px;
  --bg-img:     url('https://i.imgur.com/oUYLxgi.jpeg');
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Work Sans', sans-serif;
  background: var(--bg) var(--bg-img) center/cover fixed;
  color: var(--text);
  min-height: 100vh;
}

/* tinted overlay so bg doesn't overpower */
body::before {
  content:'';
  position:fixed; inset:0;
  background: rgba(245,242,232,0.72);
  pointer-events:none; z-index:0;
}

/* ══════════════════════════════════════════
   VIEW TOGGLE
══════════════════════════════════════════ */
.view-toggle {
  position:fixed; top:16px; right:16px; z-index:200;
  display:flex; gap:4px;
  background: rgba(26,26,20,0.75);
  border-radius:100px; padding:4px;
  backdrop-filter:blur(8px);
}

.view-btn {
  background:none; border:none; cursor:pointer;
  color:rgba(255,255,255,0.5);
  font-size:11px; font-weight:800;
  letter-spacing:0.12em; text-transform:uppercase;
  padding:7px 14px; border-radius:100px;
  transition:all 0.18s;
}

.view-btn.active { background:var(--tropical); color:#fff; }
.view-btn:hover:not(.active) { color:#fff; }

/* ══════════════════════════════════════════
   SHARED CONTAINER WRAPPER
══════════════════════════════════════════ */
#webView, #mobileView { position:relative; z-index:1; }
#mobileView { display:none; }

/* ══════════════════════════════════════════
   ██  WEB LAYOUT
══════════════════════════════════════════ */
.web-container {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 28px 80px;
}

/* ── Web Header ── */
.web-header {
  padding: 56px 0 32px;
  margin-bottom: 32px;
  border-bottom: 2px solid var(--border);
}

.web-header-inner {
  display:flex; align-items:flex-end;
  justify-content:space-between; gap:16px; flex-wrap:wrap;
}

.brand-label {
  font-size:11px; font-weight:800;
  letter-spacing:0.3em; color:var(--muted);
  text-transform:uppercase; margin-bottom:6px;
  display:block;
}

.brand-title {
  font-family:'Libre Baskerville',serif;
  font-size: clamp(40px,6vw,68px);
  font-weight:700; line-height:0.9;
  letter-spacing:-0.02em;
}

.brand-title span { display:block; font-style:italic; color:var(--tropical); }

.live-badge {
  display:flex; align-items:center; gap:8px;
  background:var(--tropical); color:#fff;
  padding:10px 20px; border-radius:100px;
  font-size:11px; font-weight:800;
  letter-spacing:0.15em; text-transform:uppercase;
  align-self:flex-start;
}

.live-dot {
  width:7px; height:7px;
  background:var(--pure-sun); border-radius:50%;
  animation:pulse 1.5s ease infinite;
}

@keyframes pulse {
  0%,100%{opacity:1;transform:scale(1);}
  50%{opacity:0.4;transform:scale(0.75);}
}

.today-date {
  font-size:12px; color:var(--muted);
  margin-top:14px; font-weight:500;
  letter-spacing:0.04em;
}

/* ── Web Stats Bar ── */
.web-stats {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:10px; margin-bottom:36px;
}

.stat-card {
  border-radius:14px; padding:16px 14px; text-align:center;
}

.stat-card:nth-child(1){background:var(--tropical);color:#fff;}
.stat-card:nth-child(2){background:var(--airplane);color:var(--text);}
.stat-card:nth-child(3){background:var(--tomato);color:#fff;}
.stat-card:nth-child(4){background:var(--pure-sun);color:var(--text);outline:2px solid #d4b430;outline-offset:-2px;}

.stat-num {
  font-family:'Libre Baskerville',serif;
  font-size:30px; font-weight:700; line-height:1;
}

.stat-lbl {
  font-size:10px; font-weight:700;
  letter-spacing:0.15em; text-transform:uppercase;
  margin-top:4px; opacity:0.75;
}

/* ── Web Section Header ── */
.web-section-hdr {
  display:flex; align-items:center;
  justify-content:space-between;
  margin-bottom:16px; gap:12px;
}

.section-title {
  font-family:'Libre Baskerville',serif;
  font-size:18px; font-weight:700; font-style:italic;
  display:flex; align-items:center; gap:10px;
}

.section-title::after {
  content:''; display:block;
  height:2px; width:48px;
  background:var(--border); border-radius:2px;
}

.btn-add {
  background:var(--tropical); color:#fff; border:none;
  padding:10px 20px; border-radius:100px;
  font-size:12px; font-weight:800;
  letter-spacing:0.1em; text-transform:uppercase;
  cursor:pointer; transition:all 0.15s;
  display:flex; align-items:center; gap:6px;
}

.btn-add:hover{background:var(--monet);transform:translateY(-1px);}

.divider{height:2px;background:var(--border);border-radius:2px;margin:32px 0;}

/* ── Web Player Card ── */
.web-card {
  background:var(--surface);
  border:2px solid var(--border);
  border-radius:var(--radius);
  margin-bottom:10px; overflow:hidden;
  transition:border-color 0.2s, box-shadow 0.2s;
  position:relative;
  backdrop-filter:blur(4px);
}

.web-card:hover{border-color:var(--tropical);box-shadow:0 4px 24px rgba(0,132,113,0.12);}
.web-card.special{border-color:#C5C0D8;}
.web-card.special:hover{border-color:var(--airplane);}

.web-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:5px;
  background:var(--tropical);
}
.web-card.special::before{background:var(--airplane);}

.web-card-main{
  display:flex; align-items:center;
  padding:16px 20px 16px 24px; gap:16px;
}

.rank-num{
  font-family:'Libre Baskerville',serif;
  font-size:28px; font-weight:700; font-style:italic;
  color:var(--border); min-width:32px; text-align:center; line-height:1;
}

/* avatar shared */
.av-wrap{position:relative;flex-shrink:0;cursor:pointer;}
.av-wrap input[type="file"]{display:none;}

.av-img{
  width:56px;height:56px;border-radius:50%;
  border:2.5px solid var(--border);
  background:var(--surface2);
  overflow:hidden; transition:border-color 0.2s;
}

.av-img img{width:100%;height:100%;object-fit:cover;display:block;}

.av-placeholder{
  width:56px;height:56px;border-radius:50%;
  border:2.5px solid var(--border);background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;transition:border-color 0.2s;
}

.av-wrap:hover .av-img,
.av-wrap:hover .av-placeholder{border-color:var(--tropical);}

.av-edit{
  position:absolute;bottom:-1px;right:-1px;
  background:var(--pure-sun);color:var(--text);
  font-size:9px;font-weight:900;
  width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}

.player-info{flex:1;min-width:0;}

.player-name{
  font-size:17px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.03em;
  line-height:1.15;
}

.mob-player-name{
  font-size:13px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.03em;
  line-height:1.15;
}

.player-meta{
  font-size:11px;color:var(--muted);margin-top:4px;
  display:flex;align-items:center;gap:7px;flex-wrap:wrap;font-weight:500;
}

.sdot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0;}
.sdot.active{background:var(--tropical);box-shadow:0 0 0 3px rgba(0,132,113,0.2);}
.sdot.inactive{background:var(--tomato);}

.streak-box{text-align:right;flex-shrink:0;min-width:148px;}

.streak-main{
  font-family:'Libre Baskerville',serif;
  font-size:20px;font-weight:700;line-height:1;
  white-space:nowrap;
}
.streak-main .n{color:var(--tomato);}

.streak-sub{font-size:9.5px;color:var(--muted);letter-spacing:0.06em;margin-top:3px;font-weight:500;white-space:nowrap;}
.milestone{font-size:15px;margin-top:5px;text-align:right;}

.web-card-actions{
  display:flex;border-top:1px solid var(--surface2);background:var(--surface2);
}

.cbtn{
  flex:1;background:none;border:none;padding:9px;color:var(--muted);
  font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  cursor:pointer;transition:all 0.15s;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.cbtn:hover{background:var(--border);color:var(--text);}
.cbtn.danger:hover{color:var(--tomato);}
.cbtn+.cbtn{border-left:1px solid var(--border);}

/* special-tag: now inline inside card-main row, not absolute */
.special-tag{
  display:inline-flex;align-items:center;
  font-size:9px;font-weight:800;
  letter-spacing:0.15em;text-transform:uppercase;
  color:#5580AA;background:#EAF2FD;
  border:1px solid var(--airplane);
  padding:3px 9px;border-radius:100px;
  white-space:nowrap;flex-shrink:0;
  align-self:flex-start;margin-top:2px;
}

.int-info{
  padding:0 20px 14px 44px;font-size:11px;color:var(--muted);
  display:flex;gap:14px;flex-wrap:wrap;align-items:center;
}
.int-item{display:flex;align-items:center;gap:5px;}
.int-lbl{text-transform:uppercase;letter-spacing:0.1em;font-size:9.5px;font-weight:700;color:var(--border);}
.int-stop{color:var(--tomato);font-weight:700;}
.int-ret{color:var(--tropical);font-weight:700;}
.int-brk{color:var(--muted);font-weight:600;}

.empty-state{text-align:center;padding:40px;color:var(--muted);font-size:14px;font-style:italic;}

/* ══════════════════════════════════════════
   ██  MOBILE LAYOUT
══════════════════════════════════════════ */
.mobile-frame {
  max-width:390px;
  margin:0 auto;
  padding:0 0 80px;
  min-height:100vh;
}

/* Mobile Header */
.mob-header {
  padding:52px 20px 20px;
  background:linear-gradient(180deg,rgba(0,132,113,0.92) 0%,rgba(0,100,86,0.88) 100%);
  position:relative; overflow:hidden;
}

.mob-header::before{
  content:'🏸';
  position:absolute;right:-20px;top:-10px;
  font-size:120px;opacity:0.08;
  transform:rotate(15deg);
  pointer-events:none;
}

.mob-brand-label{
  font-size:10px;font-weight:800;
  letter-spacing:0.3em;text-transform:uppercase;
  color:rgba(255,255,255,0.6);margin-bottom:4px;
}

.mob-brand-title{
  font-family:'Libre Baskerville',serif;
  font-size:36px;font-weight:700;line-height:0.92;
  color:#fff;letter-spacing:-0.02em;
}

.mob-brand-title span{display:block;font-style:italic;color:var(--pure-sun);}

.mob-live-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:14px;
}

.mob-live{
  display:flex;align-items:center;gap:7px;
  font-size:10px;font-weight:800;letter-spacing:0.12em;
  text-transform:uppercase;color:rgba(255,255,255,0.8);
}

.mob-date{font-size:10px;color:rgba(255,255,255,0.55);font-weight:500;}

/* Mobile Stats */
.mob-stats{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:0; margin:0;
}

.mob-stat{
  padding:12px 8px;text-align:center;
}
.mob-stat:nth-child(1){background:rgba(0,84,71,0.95);color:#fff;}
.mob-stat:nth-child(2){background:rgba(80,140,200,0.95);color:#fff;}
.mob-stat:nth-child(3){background:rgba(164,65,35,0.95);color:#fff;}
.mob-stat:nth-child(4){background:rgba(200,165,30,0.95);color:#fff;}

.mob-stat-num{
  font-family:'Libre Baskerville',serif;
  font-size:22px;font-weight:700;line-height:1;
}
.mob-stat-lbl{font-size:8px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;opacity:0.8;margin-top:2px;}

/* Mobile Body */
.mob-body{padding:16px 16px;}

/* Mobile Section Label */
.mob-section-hdr{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}

.mob-section-title{
  font-family:'Libre Baskerville',serif;
  font-size:15px;font-weight:700;font-style:italic;
  color:var(--text);
  display:flex;align-items:center;gap:8px;
}

.mob-section-title::after{
  content:'';display:block;height:2px;width:32px;
  background:var(--border);border-radius:2px;
}

.mob-btn-add{
  background:var(--tropical);color:#fff;border:none;
  padding:8px 14px;border-radius:100px;
  font-size:10px;font-weight:800;
  letter-spacing:0.1em;text-transform:uppercase;
  cursor:pointer;
}

.mob-divider{height:2px;background:var(--border);border-radius:2px;margin:20px 0;}

/* Mobile Card */
.mob-card{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:14px;
  margin-bottom:8px;overflow:hidden;
  position:relative;
  backdrop-filter:blur(4px);
  transition:border-color 0.2s;
}

.mob-card.special{border-color:#C5C0D8;}

.mob-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:var(--tropical);
}
.mob-card.special::before{background:var(--airplane);}

.mob-card-main{
  display:flex;align-items:center;
  padding:12px 14px 12px 18px;gap:12px;
}

.mob-rank{
  font-family:'Libre Baskerville',serif;
  font-size:22px;font-weight:700;font-style:italic;
  color:var(--border);min-width:26px;text-align:center;line-height:1;
}

/* mobile avatar slightly smaller */
.mob-card .av-img,
.mob-card .av-placeholder{width:46px;height:46px;}
.mob-card .av-placeholder{font-size:18px;}
.mob-card .av-edit{width:16px;height:16px;font-size:8px;}

.mob-player-info{flex:1;min-width:0;overflow:hidden;}

.mob-player-meta{
  font-size:10px;color:var(--muted);margin-top:3px;
  display:flex;align-items:center;gap:5px;flex-wrap:wrap;font-weight:500;
}

.mob-streak-box{text-align:right;flex-shrink:0;min-width:110px;}

.mob-streak-main{
  font-family:'Libre Baskerville',serif;
  font-size:15px;font-weight:700;line-height:1;
  white-space:nowrap;
}
.mob-streak-main .n{color:var(--tomato);}

.mob-streak-sub{font-size:8px;color:var(--muted);letter-spacing:0.04em;margin-top:2px;font-weight:500;white-space:nowrap;}
.mob-milestone{font-size:13px;margin-top:3px;text-align:right;}

.mob-card-actions{
  display:flex;border-top:1px solid var(--surface2);background:var(--surface2);
}

.mob-cbtn{
  flex:1;background:none;border:none;padding:7px;color:var(--muted);
  font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
  cursor:pointer;transition:all 0.15s;
  display:flex;align-items:center;justify-content:center;gap:4px;
}
.mob-cbtn:hover{background:var(--border);color:var(--text);}
.mob-cbtn.danger:hover{color:var(--tomato);}
.mob-cbtn+.mob-cbtn{border-left:1px solid var(--border);}

/* mob special tag: inline in its own row below card-main */
.mob-special-tag{
  display:inline-flex;align-items:center;
  font-size:8px;font-weight:800;
  letter-spacing:0.15em;text-transform:uppercase;
  color:#5580AA;background:#EAF2FD;
  border:1px solid var(--airplane);
  padding:2px 8px;border-radius:100px;
  white-space:nowrap;flex-shrink:0;
  align-self:flex-start;margin-top:2px;
}

.mob-int-info{
  padding:0 14px 10px 32px;font-size:10px;color:var(--muted);
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;
}

/* ══════════════════════════════════════════
   MODAL (shared)
══════════════════════════════════════════ */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(26,26,20,0.6);z-index:300;
  align-items:center;justify-content:center;
  padding:20px;backdrop-filter:blur(6px);
}
.modal-overlay.open{display:flex;}

.modal{
  background:var(--surface);
  border:2px solid var(--border);
  border-radius:20px;
  width:100%;max-width:460px;
  padding:28px;
  animation:slideUp 0.22s ease;
}

@keyframes slideUp{
  from{transform:translateY(18px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

.modal-title{
  font-family:'Libre Baskerville',serif;
  font-size:21px;font-weight:700;font-style:italic;
  margin-bottom:20px;
}

.form-row{margin-bottom:13px;}

.form-label{
  display:block;font-size:10px;font-weight:800;
  letter-spacing:0.2em;text-transform:uppercase;
  color:var(--muted);margin-bottom:6px;
}

.form-input{
  width:100%;background:var(--surface2);
  border:2px solid var(--border);border-radius:10px;
  padding:10px 14px;color:var(--text);
  font-family:'Work Sans',sans-serif;
  font-size:14px;font-weight:500;outline:none;
  transition:border-color 0.15s;
}
.form-input:focus{border-color:var(--tropical);}

.form-check{
  display:flex;align-items:center;gap:10px;
  font-size:13px;font-weight:600;
  cursor:pointer;color:var(--muted);margin-bottom:4px;
}
.form-check input{cursor:pointer;accent-color:var(--tropical);}
.form-divider{height:1px;background:var(--border);margin:13px 0;}

.modal-actions{display:flex;gap:10px;margin-top:22px;}

.btn-primary{
  flex:1;background:var(--tropical);color:#fff;border:none;
  padding:12px;border-radius:10px;
  font-size:13px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.1em;cursor:pointer;
  transition:background 0.15s;
}
.btn-primary:hover{background:var(--monet);}

.btn-secondary{
  background:var(--surface2);border:2px solid var(--border);
  color:var(--muted);padding:12px 18px;border-radius:10px;
  font-size:13px;font-weight:700;text-transform:uppercase;cursor:pointer;
}
.btn-secondary:hover{color:var(--text);}
</style>
</head>
<body>

<!-- ── VIEW TOGGLE ── -->
<div class="view-toggle">
  <button class="view-btn active" onclick="setView('web')">🖥 Web</button>
  <button class="view-btn" onclick="setView('mobile')">📱 Mobile</button>
</div>

<!-- ════════════════════════════════════════
  WEB VIEW
════════════════════════════════════════ -->
<div id="webView">
  <div class="web-container">
    <header class="web-header">
      <div class="web-header-inner">
        <div>
          <span class="brand-label">🏸 BWF World Ranking</span>
          <h1 class="brand-title">Longest<span>in Top 10</span></h1>
        </div>
        <div class="live-badge"><span class="live-dot"></span>Live Tracker</div>
      </div>
      <div class="today-date" id="webDate"></div>
    </header>

    <div class="web-stats" id="webStats"></div>

    <div class="web-section-hdr">
      <span class="section-title">Active Streaks</span>
      <button class="btn-add" onclick="openModal()">+ Tambah Pemain</button>
    </div>
    <div id="webActiveList"></div>

    <div class="divider"></div>

    <div class="web-section-hdr">
      <span class="section-title">Special Mention</span>
    </div>
    <div id="webSpecialList"></div>
  </div>
</div>

<!-- ════════════════════════════════════════
  MOBILE VIEW
════════════════════════════════════════ -->
<div id="mobileView">
  <div class="mobile-frame">
    <div class="mob-header">
      <div class="mob-brand-label">🏸 BWF World Ranking</div>
      <div class="mob-brand-title">Longest<span>in Top 10</span></div>
      <div class="mob-live-row">
        <div class="mob-live"><span class="live-dot"></span>Live Tracker</div>
        <div class="mob-date" id="mobDate"></div>
      </div>
    </div>
    <div class="mob-stats" id="mobStats"></div>
    <div class="mob-body">
      <div class="mob-section-hdr">
        <span class="mob-section-title">Active Streaks</span>
        <button class="mob-btn-add" onclick="openModal()">+ Tambah</button>
      </div>
      <div id="mobActiveList"></div>
      <div class="mob-divider"></div>
      <div class="mob-section-hdr">
        <span class="mob-section-title">Special Mention</span>
      </div>
      <div id="mobSpecialList"></div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════
  MODAL
════════════════════════════════════════ -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Tambah Pemain</div>
    <div class="form-row">
      <label class="form-label">Nama Pemain</label>
      <input class="form-input" id="fName" placeholder="Contoh: Viktor Axelsen" />
    </div>
    <div class="form-row">
      <label class="form-label">Tanggal Masuk TOP 10</label>
      <input class="form-input" type="date" id="fStart" />
    </div>
    <div class="form-check">
      <input type="checkbox" id="fSpecial" onchange="toggleSpecialFields()" />
      <label for="fSpecial" style="cursor:pointer">Special Mention (pernah terhenti)</label>
    </div>
    <div id="specialFields" style="display:none">
      <div class="form-divider"></div>
      <div class="form-row">
        <label class="form-label">Tanggal Terhenti</label>
        <input class="form-input" type="date" id="fStop" />
      </div>
      <div class="form-row">
        <label class="form-label">Tanggal Kembali ke TOP 10</label>
        <input class="form-input" type="date" id="fReturn" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Batal</button>
      <button class="btn-primary" onclick="savePlayer()">Simpan</button>
    </div>
  </div>
</div>

<script>
// ── DATA ──
const STORAGE_KEY='bwf_top10_v3';

const PHOTOS={
  1:'https://i.imgur.com/2ZU6QN3.jpeg',  // Huang Dong Ping
  2:'https://i.imgur.com/JPixBYd.jpeg',  // Akane Yamaguchi
  3:'https://i.imgur.com/UQuUF6L.jpeg',  // Fajar Alfian
  4:'https://i.imgur.com/mulSnhV.jpeg',  // Jonatan Christie
  5:'https://i.imgur.com/ROiVA3D.jpeg',  // Aaron Chia / Soh Wooi Yik
  6:'https://i.imgur.com/HkZSlor.jpeg',  // An Se Young
};

const defaultPlayers=[
  {id:1, name:"Huang Dong Ping",          start:"2017-09-21",special:false,stop:null,        returnDate:null,        avatar:null},
  {id:2, name:"Akane Yamaguchi",           start:"2016-09-29",special:false,stop:null,        returnDate:null,        avatar:null},
  {id:3, name:"Fajar Alfian",              start:"2018-07-05",special:false,stop:null,        returnDate:null,        avatar:null},
  {id:4, name:"Jonatan Christie",          start:"2019-01-29",special:false,stop:null,        returnDate:null,        avatar:null},
  {id:5, name:"Aaron Chia / Soh Wooi Yik",start:"2019-12-17",special:false,stop:null,        returnDate:null,        avatar:null},
  {id:6, name:"An Se Young",               start:"2019-11-12",special:false,stop:null,        returnDate:null,        avatar:null},
  {id:7, name:"Chen Yu Fei",               start:"2017-05-25",special:true, stop:"2025-01-21",returnDate:"2025-03-25",avatar:null},
  {id:8, name:"Lee So Hee",                start:"2015-11-19",special:true, stop:"2023-01-24",returnDate:"2023-05-02",avatar:null},
  {id:9, name:"Jia Yi Fan",                start:"2016-11-17",special:true, stop:"2025-05-20",returnDate:"2025-06-03",avatar:null},
  {id:10,name:"Ratchanok Intanon",         start:"2012-05-10",special:true, stop:"2023-11-21",returnDate:"2025-05-04",avatar:null},
  {id:11,name:"Chou Tien Chen",            start:"2014-10-30",special:true, stop:"2023-08-22",returnDate:"2024-08-06",avatar:null},
  {id:12,name:"Dechapol Puavaranukroh",    start:"2018-10-25",special:true, stop:"2025-01-14",returnDate:"2025-05-20",avatar:null},
];

function loadPlayers(){try{const s=localStorage.getItem(STORAGE_KEY);return s?JSON.parse(s):defaultPlayers;}catch{return defaultPlayers;}}
function savePlayers(p){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(p));}catch{}}

let players=loadPlayers(),editingId=null;
const TODAY=new Date();TODAY.setHours(0,0,0,0);

function pd(s){return new Date(s+'T00:00:00');}
function dd(a,b){return Math.floor((b-a)/86400000);}

function totalDays(p){
  const s=pd(p.start);
  if(!p.special||!p.stop||!p.returnDate)return dd(s,TODAY);
  return dd(s,pd(p.stop))+dd(pd(p.returnDate),TODAY);
}

function breakDays(p){
  if(!p.stop||!p.returnDate)return 0;
  return dd(pd(p.stop),pd(p.returnDate));
}

function fmtDur(d){
  if(d<0)d=0;
  const y=Math.floor(d/365),r=d%365;
  return{years:y,months:Math.floor(r/30),days:r%30};
}

function durShort(d){return`${d.years}Y ${d.months}M ${d.days}D`;}
function durFull(d){return`${d.years} Years, ${d.months} Months, ${d.days} Days`;}

function milestone(y){
  if(y>=10)return'🏆';if(y>=7)return'⭐';if(y>=5)return'🎖️';if(y>=3)return'💪';return'';
}

function fmtDate(s){
  if(!s)return'-';
  return pd(s).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'});
}

function getAvatar(p){
  if(p.avatar)return p.avatar;
  if(PHOTOS[p.id])return PHOTOS[p.id];
  return null;
}

function avatarHTML(p){
  const src=getAvatar(p);
  if(src)return`<div class="av-img"><img src="${src}" alt="${p.name}" onerror="this.parentElement.innerHTML=getEmojiHtml('${p.name}')"/></div>`;
  return`<div class="av-placeholder">${getEmoji(p.name)}</div>`;
}

function getEmojiHtml(name){return`<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:22px">${getEmoji(name)}</div>`;}

function getEmoji(n){const e=['🏸','🥇','⚡','🎯','🔥','💥','🌟','⭐','🚀','💎','🏅','👑'];let h=0;for(let c of n)h+=c.charCodeAt(0);return e[h%e.length];}

// ── VIEW TOGGLE ──
let currentView='web';
function setView(v){
  currentView=v;
  document.getElementById('webView').style.display=v==='web'?'block':'none';
  document.getElementById('mobileView').style.display=v==='mobile'?'block':'none';
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase().includes(v)));
}

// ── RENDER ──
function render(){
  const dateStr=TODAY.toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const shortDate=TODAY.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'});
  document.getElementById('webDate').textContent='Update: '+dateStr;
  document.getElementById('mobDate').textContent=shortDate;

  const active=players.filter(p=>!p.special).sort((a,b)=>totalDays(b)-totalDays(a));
  const special=players.filter(p=>p.special).sort((a,b)=>totalDays(b)-totalDays(a));

  renderStats(active,special);
  renderWebList('webActiveList',active,false);
  renderWebList('webSpecialList',special,true);
  renderMobList('mobActiveList',active,false);
  renderMobList('mobSpecialList',special,true);
}

function renderStats(active,special){
  const all=[...active,...special];
  const longest=all.reduce((m,p)=>Math.max(m,totalDays(p)),0);
  const dur=fmtDur(longest);
  const trophies=all.filter(p=>fmtDur(totalDays(p)).years>=10).length;

  const webHTML=`
    <div class="stat-card"><div class="stat-num">${active.length}</div><div class="stat-lbl">Active</div></div>
    <div class="stat-card"><div class="stat-num">${special.length}</div><div class="stat-lbl">Special</div></div>
    <div class="stat-card"><div class="stat-num">${dur.years}Y</div><div class="stat-lbl">Longest</div></div>
    <div class="stat-card"><div class="stat-num">${trophies}</div><div class="stat-lbl">🏆 10Y Club</div></div>
  `;
  document.getElementById('webStats').innerHTML=webHTML;

  const mobHTML=`
    <div class="mob-stat"><div class="mob-stat-num">${active.length}</div><div class="mob-stat-lbl">Active</div></div>
    <div class="mob-stat"><div class="mob-stat-num">${special.length}</div><div class="mob-stat-lbl">Special</div></div>
    <div class="mob-stat"><div class="mob-stat-num">${dur.years}Y</div><div class="mob-stat-lbl">Longest</div></div>
    <div class="mob-stat"><div class="mob-stat-num">${trophies}</div><div class="mob-stat-lbl">🏆 10Y</div></div>
  `;
  document.getElementById('mobStats').innerHTML=mobHTML;
}

// ── WEB CARDS ──
function renderWebList(elId,list,isSpecial){
  const el=document.getElementById(elId);
  if(!list.length){el.innerHTML='<div class="empty-state">Belum ada data.</div>';return;}
  el.innerHTML=list.map((p,i)=>webCard(p,i+1,isSpecial)).join('');
}

function webCard(p,rank,isSpecial){
  const total=totalDays(p),dur=fmtDur(total),ms=milestone(dur.years);
  const bd=breakDays(p),bdur=bd>0?fmtDur(bd):null;

  const intHTML=isSpecial&&p.stop?`
    <div class="int-info">
      <span class="int-item"><span class="int-lbl">Terhenti:</span><span class="int-stop">${fmtDate(p.stop)}</span></span>
      ${p.returnDate?`<span class="int-item"><span class="int-lbl">Kembali:</span><span class="int-ret">${fmtDate(p.returnDate)}</span></span>`:''}
      ${bdur?`<span class="int-item"><span class="int-lbl">Jeda:</span><span class="int-brk">${durShort(bdur)}</span></span>`:''}
    </div>`:'';

  return`<div class="web-card${isSpecial?' special':''}" id="wc-${p.id}">
    <div class="web-card-main">
      <div class="rank-num">${rank}</div>
      <div class="av-wrap" onclick="triggerUpload(${p.id},'w')" title="Klik ganti foto">
        <input type="file" id="wAvInput-${p.id}" accept="image/*" onchange="handleUpload(event,${p.id})" />
        ${avatarHTML(p)}
        <span class="av-edit">✎</span>
      </div>
      <div class="player-info">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <div class="player-name">${p.name}</div>
          ${isSpecial?'<span class="special-tag">Special Mention</span>':''}
        </div>
        <div class="player-meta">
          <span class="sdot ${isSpecial?'inactive':'active'}"></span>
          Sejak ${fmtDate(p.start)} &bull; ${total.toLocaleString()} hari
        </div>
      </div>
      <div class="streak-box">
        <div class="streak-main"><span class="n">${dur.years}</span>Y <span class="n">${dur.months}</span>M <span class="n">${dur.days}</span>D</div>
        <div class="streak-sub">${durFull(dur)}</div>
        ${ms?`<div class="milestone">${ms}</div>`:''}
      </div>
    </div>
    ${intHTML}
    <div class="web-card-actions">
      <button class="cbtn" onclick="openModal(${p.id})">✏ Edit</button>
      <button class="cbtn danger" onclick="deletePlayer(${p.id})">✕ Hapus</button>
    </div>
  </div>`;
}

// ── MOBILE CARDS ──
function renderMobList(elId,list,isSpecial){
  const el=document.getElementById(elId);
  if(!list.length){el.innerHTML='<div class="empty-state">Belum ada data.</div>';return;}
  el.innerHTML=list.map((p,i)=>mobCard(p,i+1,isSpecial)).join('');
}

function mobCard(p,rank,isSpecial){
  const total=totalDays(p),dur=fmtDur(total),ms=milestone(dur.years);
  const bd=breakDays(p),bdur=bd>0?fmtDur(bd):null;

  const intHTML=isSpecial&&p.stop?`
    <div class="mob-int-info">
      <span class="int-item"><span class="int-lbl">Terhenti:</span><span class="int-stop">${fmtDate(p.stop)}</span></span>
      ${p.returnDate?`<span class="int-item"><span class="int-lbl">Kembali:</span><span class="int-ret">${fmtDate(p.returnDate)}</span></span>`:''}
      ${bdur?`<span class="int-item"><span class="int-lbl">Jeda:</span><span class="int-brk">${durShort(bdur)}</span></span>`:''}
    </div>`:'';

  return`<div class="mob-card${isSpecial?' special':''}" id="mc-${p.id}">
    <div class="mob-card-main">
      <div class="mob-rank">${rank}</div>
      <div class="av-wrap" onclick="triggerUpload(${p.id},'m')" title="Klik ganti foto">
        <input type="file" id="mAvInput-${p.id}" accept="image/*" onchange="handleUpload(event,${p.id})" />
        ${avatarHTML(p)}
        <span class="av-edit">✎</span>
      </div>
      <div class="mob-player-info">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
          <div class="mob-player-name">${p.name}</div>
          ${isSpecial?'<span class="mob-special-tag">Special</span>':''}
        </div>
        <div class="mob-player-meta">
          <span class="sdot ${isSpecial?'inactive':'active'}"></span>
          ${fmtDate(p.start)}
        </div>
      </div>
      <div class="mob-streak-box">
        <div class="mob-streak-main"><span class="n">${dur.years}</span>Y <span class="n">${dur.months}</span>M <span class="n">${dur.days}</span>D</div>
        <div class="mob-streak-sub">${durFull(dur)}</div>
        ${ms?`<div class="mob-milestone">${ms}</div>`:''}
      </div>
    </div>
    ${intHTML}
    <div class="mob-card-actions">
      <button class="mob-cbtn" onclick="openModal(${p.id})">✏ Edit</button>
      <button class="mob-cbtn danger" onclick="deletePlayer(${p.id})">✕ Hapus</button>
    </div>
  </div>`;
}

// ── AVATAR UPLOAD ──
function triggerUpload(id,prefix){
  document.getElementById(`${prefix==='w'?'w':'m'}AvInput-${id}`).click();
}

function handleUpload(event,id){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const idx=players.findIndex(p=>p.id===id);
    if(idx!==-1){players[idx].avatar=e.target.result;savePlayers(players);render();}
  };
  reader.readAsDataURL(file);
}

// ── MODAL ──
function openModal(id=null){
  editingId=id;
  document.getElementById('modalTitle').textContent=id?'Edit Pemain':'Tambah Pemain';
  if(id){
    const p=players.find(x=>x.id===id);
    document.getElementById('fName').value=p.name;
    document.getElementById('fStart').value=p.start;
    document.getElementById('fSpecial').checked=p.special;
    document.getElementById('fStop').value=p.stop||'';
    document.getElementById('fReturn').value=p.returnDate||'';
    toggleSpecialFields();
  }else{
    ['fName','fStop','fReturn'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('fStart').value='';
    document.getElementById('fSpecial').checked=false;
    document.getElementById('specialFields').style.display='none';
  }
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('open');editingId=null;}
function handleOverlayClick(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}
function toggleSpecialFields(){document.getElementById('specialFields').style.display=document.getElementById('fSpecial').checked?'block':'none';}

function savePlayer(){
  const name=document.getElementById('fName').value.trim();
  const start=document.getElementById('fStart').value;
  const special=document.getElementById('fSpecial').checked;
  const stop=special?(document.getElementById('fStop').value||null):null;
  const returnDate=special?(document.getElementById('fReturn').value||null):null;
  if(!name||!start){alert('Nama dan tanggal masuk TOP 10 wajib diisi.');return;}
  if(editingId){
    const idx=players.findIndex(p=>p.id===editingId);
    if(idx!==-1)players[idx]={...players[idx],name,start,special,stop,returnDate};
  }else{
    players.push({id:Math.max(0,...players.map(p=>p.id))+1,name,start,special,stop,returnDate,avatar:null});
  }
  savePlayers(players);closeModal();render();
}

function deletePlayer(id){
  const p=players.find(x=>x.id===id);
  if(!p||!confirm(`Hapus "${p.name}"?`))return;
  players=players.filter(x=>x.id!==id);savePlayers(players);render();
}

render();
setInterval(()=>{TODAY.setHours(0,0,0,0);render();},60000);
</script>
</body>
</html>
